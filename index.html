<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <style>
    .loader {
      border-top-color: #7c3aed;
      animation: spinner 1.5s linear infinite;
    }

    @keyframes spinner {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .active-tab {
      background-color: #4f46e5 !important;
      color: white !important;
    }
  </style>
  <script src="index.js" defer></script>
</head>

<body class="bg-[#F8FAFC]">
  <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center"><i
        class="fab fa-github text-6xl mb-4 text-gray-800"></i>
      <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
      <p class="text-[#64748B] mb-6 text-sm">Please sign in to your account</p>
      <div class="space-y-4 text-left">
        <div><label class="block text-sm font-medium text-gray-700">Username</label><input type="text" id="username"
            placeholder="Enter username"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          <p class="text-sm text-[#4A00FF] mt-1">Default: admin</p>
        </div>
        <div><label class="block text-sm font-medium text-gray-700">Password</label><input type="password" id="password"
            placeholder="Enter password"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          <p class="text-sm text-[#4A00FF] mt-1">Default: admin123</p>
        </div><button onclick="handleLogin()"
          class="w-full bg-[#4A00FF] text-white py-2 rounded-lg font-semibold hover:bg-[#3B00CC] transition">Sign
          In</button>
      </div>
      <div class="mt-6 p-4 bg-white rounded-lg border border-dashed border-gray-300">
        <p class="text-xs font-bold text-gray-800 uppercase mb-2">Demo Credentials</p>
        <p class="text-sm text-gray-600">Username: admin <br> Password: admin123</p>
      </div>
    </div>
  </div>

  <div id="main-page" class="hidden min-h-screen pb-10">
    <nav class="bg-white shadow-sm px-4 py-3 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-2 cursor-pointer" onclick="filterIssues('all')"><i
            class="fab fa-github text-3xl text-gray-800"></i><span class="font-bold text-lg text-gray-800">GitHub
            Issues Tracker</span></div>
        <div class="flex items-center gap-3 w-full md:w-auto">
          <div class="relative w-full"><i class="fas fa-search absolute left-3 top-3 text-gray-400"></i><input
              type="text" id="search-input" onkeyup="handleSearch()" placeholder="Search issues..."
              class="pl-10 pr-4 py-2 bg-gray-100 rounded-lg w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-[#4A00FF] transition">
          </div><button class="bg-[#4A00FF] text-white px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap">+New
            Issue</button>
        </div>
      </div>
    </nav>
    <div class="max-w-7xl mx-auto px-4 mt-8">
      <div class="flex justify-center mb-8">
        <div class="bg-white p-1 rounded-xl shadow-sm inline-flex"><button onclick="filterIssues('all')" id="btn-all"
            class="tab-btn px-6 py-2 rounded-lg text-sm font-medium text-gray-600 transition active-tab">All</button><button
            onclick="filterIssues('open')" id="btn-open"
            class="tab-btn px-6 py-2 rounded-lg text-sm font-medium text-gray-600 transition">Open</button><button
            onclick="filterIssues('closed')" id="btn-closed"
            class="tab-btn px-6 py-2 rounded-lg text-sm font-medium text-gray-600 transition">Closed</button>
        </div>
      </div>
      <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-xl shadow-sm">
        <div class="flex items-center gap-4">
          <div class="p-3 bg-[#4A00FF] rounded-lg text-white"><i class="fas fa-list-check text-xl"></i>
          </div>
          <div>
            <h2 class="text-xl font-bold text-gray-800" id="issue-count-text">0 Issues</h2>
            <p class="text-sm text-gray-500">Track and manage your project issues</p>
          </div>
        </div>
        <div class="hidden sm:flex gap-4"><span class="flex items-center gap-2 text-sm text-gray-600"><span
              class="w-2 h-2 rounded-full bg-green-600"></span>Open</span><span
            class="flex items-center gap-2 text-sm text-gray-600"><span
              class="w-2 h-2 rounded-full bg-purple-600"></span>Closed</span></div>
      </div>
      <div id="loading-spinner" class="flex justify-center items-center py-20">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
      </div>
      <div id="issue-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      </div>
    </div>
    <div id="issue-modal" class="fixed inset-0 bg-black/35 items-center justify-center p-4 z-60 hidden">
      <div class="bg-white rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl animate-scaleIn">
        <div id="modal-content" class="p-8">

        </div>
        <div class="px-8 py-4 bg-gray-50 flex justify-end border-t"><button onclick="closeModal()"
            class="bg-[#4A00FF] text-white px-8 py-2 rounded-lg font-medium hover:bg-[#3a00cc] transition">Close</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
